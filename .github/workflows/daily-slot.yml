name: Daily Slot
on:
  schedule:
    - cron: '25 9 * * *'
  workflow_dispatch:
jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - name: Generate daily slots
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          echo "Generating slots for $TODAY"
          curl -s -X POST https://ai-for-developers-project-387-tuls.onrender.com/api/slots/generate \
            -H "Content-Type: application/json" \
            -d "{\"startDate\":\"${TODAY}\",\"endDate\":\"${TODAY}\"}"
