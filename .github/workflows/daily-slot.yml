name: Daily Slot
on:
  schedule:
    - cron: '50 9 * * *'
  workflow_dispatch:
jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci
        working-directory: frontend
      - name: Build
        run: npm run build
        working-directory: frontend
      - name: Generate daily slots on production
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          echo "Generating slots for $TODAY"
          curl -s -X POST https://ai-for-developers-project-387-tuls.onrender.com/api/slots/generate \
            -H "Content-Type: application/json" \
            -d "{\"startDate\":\"${TODAY}\",\"endDate\":\"${TODAY}\"}"
      - name: Run Lighthouse
        run: |
          npx lighthouse https://ai-for-developers-project-387-tuls.onrender.com \
            --output=json \
            --output-path=./lighthouse-report.json \
            --chrome-flags="--headless --no-sandbox" || true
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: lighthouse-report.json
